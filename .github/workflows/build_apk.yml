name: Build & Sign APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install ImageMagick untuk resize icon
        run: sudo apt-get install -y imagemagick

      - name: Generate launcher icons dari logo
        run: |
          # Buat icon yang valid untuk semua resolusi dari logo_sekolah.png
          SRC="app/src/main/res/drawable/logo_sekolah.png"
          for density in hdpi xhdpi xxhdpi xxxhdpi; do
            case $density in
              hdpi)    size=72  ;;
              xhdpi)   size=96  ;;
              xxhdpi)  size=144 ;;
              xxxhdpi) size=192 ;;
            esac
            DIR="app/src/main/res/mipmap-${density}"
            mkdir -p "$DIR"
            convert "$SRC" -resize ${size}x${size} "$DIR/ic_launcher.png"
            convert "$SRC" -resize ${size}x${size} \
              \( +clone -alpha extract \
                 -draw "fill white circle $((size/2)),$((size/2)),$((size/2)),0" \
                 -alpha off \) \
              -compose copy_opacity -composite "$DIR/ic_launcher_round.png" 2>/dev/null || \
            cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_round.png"
            echo "✅ $density: ${size}x${size}"
          done

      - name: Download Poppins fonts
        run: |
          mkdir -p app/src/main/res/font
          curl -L "https://fonts.gstatic.com/s/poppins/v21/pxiEyp8kv8JHgFVrFJA.ttf"     -o app/src/main/res/font/poppins_regular.ttf
          curl -L "https://fonts.gstatic.com/s/poppins/v21/pxiByp8kv8JHgFVrLGT9V1s.ttf" -o app/src/main/res/font/poppins_medium.ttf
          curl -L "https://fonts.gstatic.com/s/poppins/v21/pxiByp8kv8JHgFVrLEj6V1s.ttf" -o app/src/main/res/font/poppins_semibold.ttf
          curl -L "https://fonts.gstatic.com/s/poppins/v21/pxiByp8kv8JHgFVrLCz7V1s.ttf" -o app/src/main/res/font/poppins_bold.ttf

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/cbtsmkn1pol.jks
          echo "Keystore size: $(du -sh app/cbtsmkn1pol.jks)"

      - name: Build Signed Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/cbtsmkn1pol.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --stacktrace

      - name: Rename APK
        run: |
          DATE=$(date +'%Y%m%d')
          cp app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/CBTsmkn1pol-${DATE}.apk
          echo "APK size: $(du -sh app/build/outputs/apk/release/CBTsmkn1pol-${DATE}.apk)"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CBTsmkn1pol-Release
          path: app/build/outputs/apk/release/CBTsmkn1pol-*.apk
          retention-days: 60

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "CBTsmkn1pol v${{ github.run_number }}"
          body: |
            ## 📱 CBTsmkn1pol — SMK Negeri 1 Gempol

            **Build:** #${{ github.run_number }}
            **Tanggal:** ${{ github.event.head_commit.timestamp }}
            **Tipe:** Release (Signed, ProGuard aktif)

            ### ⬇️ Cara Install:
            1. Download file `CBTsmkn1pol-*.apk` di bawah
            2. Buka di HP Android → Install
            3. Aktifkan *"Install dari sumber tidak dikenal"* jika diminta

            ### Fitur:
            - ✅ Screen lock otomatis saat ujian
            - ⏳ Timer 30 menit tidak bisa keluar
            - 🔐 PIN darurat pengawas
            - 🌐 Jaringan Lokal & Online
          files: app/build/outputs/apk/release/CBTsmkn1pol-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
